<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — my-learnings</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;600;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet" />
  <style>
    /* Inlined so the 404 renders correctly regardless of which path the
       user typed (browser resolves relative URLs against that path).
       Mirrors the tokens defined in assets/css/base.css. */
    :root {
      --bg: #0c0e13; --panel: #151823; --panel-3: #07090d;
      --text: #e7eaf2; --text-strong: #f7f8fb; --text-2: #b9c0d3;
      --dim: #8b94ab; --border: rgba(255,255,255,0.06);
      --border-3: rgba(255,255,255,0.18);
      --acc-1: #7c5cff; --acc-2: #5fe0cc;
      --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", "Inter", sans-serif;
      --font-display: 'Syne', var(--font-sans);
      --font-mono: 'JetBrains Mono', ui-monospace, monospace;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--font-sans);
      background: var(--bg); color: var(--text);
      min-height: 100vh; display: flex; flex-direction: column;
      line-height: 1.55;
      background-image:
        radial-gradient(ellipse 800px 480px at 30% -10%, rgba(124,92,255,0.18), transparent 60%),
        radial-gradient(ellipse 600px 360px at 80% 0%, rgba(95,224,204,0.10), transparent 60%);
    }
    header {
      padding: 22px 32px;
      border-bottom: 1px solid var(--border);
    }
    .logo-top {
      font-family: var(--font-mono); font-size: 11px;
      letter-spacing: 0.22em; color: var(--acc-1); text-transform: uppercase;
    }
    .logo-main {
      font-family: var(--font-display); font-size: 22px;
      font-weight: 800; color: var(--text-strong);
    }
    .logo-main span { color: var(--acc-1); }
    main {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 16px;
      text-align: center; padding: 60px 20px;
    }
    .code {
      font-family: var(--font-display);
      font-size: clamp(96px, 16vw, 168px); font-weight: 800;
      line-height: 1; letter-spacing: -0.04em;
      background: linear-gradient(110deg, #fff, #b3a4ff 60%, #7dd6c7);
      -webkit-background-clip: text; background-clip: text;
      color: transparent;
    }
    h1 {
      font-family: var(--font-display); font-size: 24px; font-weight: 700;
      color: var(--text-strong); letter-spacing: -0.01em;
    }
    p {
      color: var(--text-2); font-size: 14px;
      max-width: 50ch; line-height: 1.6;
    }
    .home-link {
      margin-top: 20px;
      background: linear-gradient(180deg, var(--acc-1), #5e44d6);
      color: #fff; border: 0;
      padding: 11px 22px; border-radius: 8px;
      font-size: 13px; font-weight: 500;
      text-decoration: none;
      transition: filter 150ms;
      box-shadow:
        0 1px 0 rgba(255,255,255,0.18) inset,
        0 8px 24px -12px rgba(124,92,255,0.6);
    }
    .home-link:hover { filter: brightness(1.10); }
  </style>
</head>
<body>
  <header>
    <div class="logo-top">my · learnings</div>
    <div class="logo-main">notes <span>&</span> viz</div>
  </header>

  <main>
    <div class="code">404</div>
    <h1>Page not found</h1>
    <p>The page you were looking for isn't here. It may have moved, or it may never have existed.</p>
    <a class="home-link" id="home" href="/">← Back to home</a>
  </main>

  <script>
    // Make "back to home" work whether this is a user site (username.github.io)
    // or a project site (username.github.io/repo-name/).
    (function () {
      var parts = window.location.pathname.split('/').filter(Boolean);
      var host = window.location.hostname;
      var isProject = /\.github\.io$/.test(host) && parts.length > 0;
      var home = isProject ? '/' + parts[0] + '/' : '/';
      document.getElementById('home').setAttribute('href', home);
    })();
  </script>
</body>
</html>
